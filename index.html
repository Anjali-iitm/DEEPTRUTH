<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEPTRUTH - AI Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://esm.sh/firebase@10.8.1/app",
            "firebase/auth": "https://esm.sh/firebase@10.8.1/auth",
            "firebase/firestore": "https://esm.sh/firebase@10.8.1/firestore",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0a0f1c]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'firebase/firestore';
        import { 
          Upload, Hash, ScanFace, Activity, ChevronRight,
          Database, AlertTriangle, CheckCircle, Network, Clock, Trash2, Server, Fingerprint, User,
          Mic, Cpu, Layers, RotateCcw
        } from 'lucide-react';

        // --- AUTH TRACKING ---
        // We create a unique ID for this browser session so users can only delete their own uploads
        const getSessionId = () => {
            let id = localStorage.getItem('deepTruth_session_id');
            if (!id) {
                id = 'user_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('deepTruth_session_id', id);
            }
            return id;
        };
        const mySessionId = getSessionId();

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "demo-project", apiKey: "demo-key" };
        let app, auth, db;
        try { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } catch(e) {}
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        function App() {
          const [activeTab, setActiveTab] = useState('architecture');
          const [dbRecords, setDbRecords] = useState([]);
          const [originalFile, setOriginalFile] = useState(null);
          const [originalUrl, setOriginalUrl] = useState(null);
          const [isRegistering, setIsRegistering] = useState(false);
          const [authorName, setAuthorName] = useState('');
          const [biometricStatus, setBiometricStatus] = useState('unverified'); 
          const [suspectUrl, setSuspectUrl] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [progress, setProgress] = useState(0);
          const [analysisResults, setAnalysisResults] = useState(null);
          const originalVideoRef = useRef(null);
          const suspectVideoRef = useRef(null);
          const canvasRef = useRef(null);

          useEffect(() => {
            if (db) {
                const recordsRef = collection(db, 'artifacts', appId, 'public_videos');
                return onSnapshot(recordsRef, (snapshot) => {
                  const records = [];
                  snapshot.forEach(doc => { records.push({ id: doc.id, ...doc.data() }); });
                  setDbRecords(records.sort((a, b) => b.timestamp - a.timestamp));
                });
            } else {
                const saved = localStorage.getItem('deepTruth_local_db');
                if (saved) setDbRecords(JSON.parse(saved));
            }
          }, []);

          const calculateHammingDistance = (h1, h2) => {
            let d = 0;
            const b1 = parseInt(h1, 16).toString(2).padStart(64, '0');
            const b2 = parseInt(h2, 16).toString(2).padStart(64, '0');
            for (let i = 0; i < b1.length; i++) { if (b1[i] !== b2[i]) d++; }
            return d;
          };

          const extractHashes = async (video) => {
            const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
            canvas.width = 8; canvas.height = 8;
            const hashes = [];
            for (let i = 1; i <= 5; i++) {
              video.currentTime = (video.duration / 6) * i;
              await new Promise(r => video.onseeked = r);
              ctx.drawImage(video, 0, 0, 8, 8);
              hashes.push(Math.random().toString(16).substr(2, 16)); // Simulated Hash for Demo
            }
            return hashes;
          };

          const registerVideo = async () => {
            setIsRegistering(true);
            const hashes = await extractHashes(originalVideoRef.current);
            const newRecord = {
                name: originalFile.name,
                author: authorName,
                timestamp: Date.now(),
                hashes: hashes,
                ownerId: mySessionId // ONLY THE OWNER CAN DELETE
            };
            if (db) {
                await addDoc(collection(db, 'artifacts', appId, 'public_videos'), newRecord);
            } else {
                const updated = [newRecord, ...dbRecords];
                setDbRecords(updated);
                localStorage.setItem('deepTruth_local_db', JSON.stringify(updated));
            }
            setIsRegistering(false); setOriginalUrl(null); setAuthorName(''); setBiometricStatus('unverified');
          };

          const deleteVideo = async (record) => {
            if (record.ownerId !== mySessionId) {
                alert("Access Denied: You can only delete videos you uploaded.");
                return;
            }
            if (db) { await deleteDoc(doc(db, 'artifacts', appId, 'public_videos', record.id)); }
            else {
                const updated = dbRecords.filter(r => r.timestamp !== record.timestamp);
                setDbRecords(updated);
                localStorage.setItem('deepTruth_local_db', JSON.stringify(updated));
            }
          };

          const runVerify = async () => {
            setIsAnalyzing(true); setProgress(20);
            await new Promise(r => setTimeout(r, 1500));
            setProgress(100);
            const match = dbRecords.find(r => r.name === suspectFile?.name) || null;
            setAnalysisResults({
                verdict: match ? "AUTHENTIC MATCH" : "NO MATCH / DEEPFAKE",
                score: match ? 2 : 88
            });
            setIsAnalyzing(false);
          };

          return (
            <div className="min-h-screen bg-[#0a0f1c] text-slate-200 p-8 font-sans">
              <div className="max-w-7xl mx-auto space-y-8">
                <header className="flex justify-between items-center border-b border-blue-900/50 pb-6">
                  <h1 className="text-3xl font-bold text-blue-400 flex items-center gap-2"><Network/> DEEPTRUTH</h1>
                  <div className="flex bg-[#111827] rounded-lg p-1 border border-slate-800">
                    {['architecture', 'database', 'verify'].map(tab => (
                      <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-md text-sm uppercase ${activeTab === tab ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                        {tab}
                      </button>
                    ))}
                  </div>
                </header>

                {activeTab === 'architecture' && (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in">
                    <div className="bg-[#0f1522] p-8 rounded-2xl border border-slate-800"><Hash className="text-blue-500 mb-4"/> <h3 className="font-bold">Hashing</h3><p className="text-sm text-slate-400">Fingerprinting video frames.</p></div>
                    <div className="bg-[#0f1522] p-8 rounded-2xl border border-slate-800"><Mic className="text-amber-500 mb-4"/> <h3 className="font-bold">Audio</h3><p className="text-sm text-slate-400">Acoustic cloning detection.</p></div>
                    <div className="bg-[#0f1522] p-8 rounded-2xl border border-slate-800"><ScanFace className="text-purple-500 mb-4"/> <h3 className="font-bold">Face</h3><p className="text-sm text-slate-400">Vector mapping analysis.</p></div>
                  </div>
                )}

                {activeTab === 'database' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="bg-[#111827] p-6 rounded-2xl border border-slate-800">
                      <h2 className="text-xl font-bold mb-4 text-blue-400">Register Original</h2>
                      {!originalUrl ? (
                        <label className="border-2 border-dashed border-slate-700 h-48 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-900/10 rounded-xl">
                          <Upload/> <span>Select Video</span>
                          <input type="file" className="hidden" onChange={(e) => {setOriginalFile(e.target.files[0]); setOriginalUrl(URL.createObjectURL(e.target.files[0]))}} />
                        </label>
                      ) : (
                        <div className="space-y-4">
                          <video ref={originalVideoRef} src={originalUrl} controls className="w-full rounded-lg" />
                          <input type="text" placeholder="Subject Name" className="w-full bg-slate-900 p-2 rounded border border-slate-700" onChange={e => setAuthorName(e.target.value)} />
                          <button onClick={() => setBiometricStatus('verified')} className="w-full py-2 bg-purple-600/20 text-purple-400 border border-purple-500/50 rounded">Verify Identity</button>
                          <button onClick={registerVideo} disabled={biometricStatus !== 'verified'} className="w-full py-3 bg-blue-600 rounded font-bold disabled:opacity-50">Save to Cloud</button>
                        </div>
                      )}
                    </div>
                    <div className="space-y-4">
                      <h3 className="font-bold flex items-center gap-2"><Server className="text-emerald-500"/> Verified Registry</h3>
                      {dbRecords.map(r => (
                        <div key={r.timestamp} className="bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex justify-between items-center group">
                          <div><p className="font-medium">{r.name}</p><p className="text-xs text-slate-500">By: {r.author}</p></div>
                          {r.ownerId === mySessionId && (
                            <button onClick={() => deleteVideo(r)} className="text-slate-600 hover:text-red-500"><Trash2 size={18}/></button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'verify' && (
                  <div className="max-w-2xl mx-auto bg-[#111827] p-8 rounded-2xl border border-slate-800">
                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><ScanFace className="text-indigo-400"/> Forensics Lab</h2>
                    {!suspectUrl ? (
                        <label className="border-2 border-dashed border-slate-700 h-64 flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-900/10 rounded-xl">
                          <Upload className="mb-2"/> <span>Upload Video for Verification</span>
                          <input type="file" className="hidden" onChange={(e) => {setSuspectUrl(URL.createObjectURL(e.target.files[0]))}} />
                        </label>
                    ) : (
                        <div className="space-y-6">
                            <video ref={suspectVideoRef} src={suspectUrl} className="w-full rounded-xl border border-slate-700" controls />
                            {!analysisResults ? (
                                <button onClick={runVerify} className="w-full py-4 bg-indigo-600 rounded-xl font-bold text-lg shadow-lg">Run AI Analysis</button>
                            ) : (
                                <div className={`p-6 rounded-xl border-2 ${analysisResults.score < 10 ? 'bg-emerald-900/20 border-emerald-500' : 'bg-red-900/20 border-red-500'}`}>
                                    <p className="text-xs uppercase font-bold opacity-60">Verdict</p>
                                    <p className="text-3xl font-black">{analysisResults.verdict}</p>
                                    <button onClick={() => {setSuspectUrl(null); setAnalysisResults(null)}} className="mt-4 flex items-center gap-2 text-sm text-slate-400"><RotateCcw size={14}/> Scan Another</button>
                                </div>
                            )}
                        </div>
                    )}
                  </div>
                )}
                <canvas ref={canvasRef} className="hidden" />
              </div>
            </div>
          );
        }
        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
