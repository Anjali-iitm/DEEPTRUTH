<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEPTRUTH - AI Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://esm.sh/firebase@10.8.1/app",
            "firebase/auth": "https://esm.sh/firebase@10.8.1/auth",
            "firebase/firestore": "https://esm.sh/firebase@10.8.1/firestore",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0a0f1c]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, addDoc, onSnapshot } from 'firebase/firestore';
        import { 
          Upload, Hash, ScanFace, Activity, ChevronRight,
          Database, AlertTriangle, CheckCircle, Network, Clock, Server, Fingerprint, User,
          Mic, Cpu, Layers, RotateCcw
        } from 'lucide-react';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "demo-project", apiKey: "demo-key" };
        let app, auth, db;
        try { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } catch(e) {}
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        function App() {
          const [activeTab, setActiveTab] = useState('architecture');
          const [dbRecords, setDbRecords] = useState([]);
          const [originalFile, setOriginalFile] = useState(null);
          const [originalUrl, setOriginalUrl] = useState(null);
          const [isRegistering, setIsRegistering] = useState(false);
          const [authorName, setAuthorName] = useState('');
          const [biometricStatus, setBiometricStatus] = useState('unverified'); 
          const [suspectFile, setSuspectFile] = useState(null);
          const [suspectUrl, setSuspectUrl] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [scanStage, setScanStage] = useState('');
          const [progress, setProgress] = useState(0);
          const [analysisResults, setAnalysisResults] = useState(null);
          
          const originalVideoRef = useRef(null);
          const suspectVideoRef = useRef(null);
          const canvasRef = useRef(null);

          useEffect(() => {
            if (db) {
                const recordsRef = collection(db, 'artifacts', appId, 'public_videos');
                return onSnapshot(recordsRef, (snapshot) => {
                  const records = [];
                  snapshot.forEach(doc => { records.push({ id: doc.id, ...doc.data() }); });
                  setDbRecords(records.sort((a, b) => b.timestamp - a.timestamp));
                });
            } else {
                const saved = localStorage.getItem('deepTruth_local_db');
                if (saved) setDbRecords(JSON.parse(saved));
            }
          }, []);

          const calculateHammingDistance = (h1, h2) => {
            let d = 0;
            const b1 = parseInt(h1, 16).toString(2).padStart(64, '0');
            const b2 = parseInt(h2, 16).toString(2).padStart(64, '0');
            for (let i = 0; i < b1.length; i++) { if (b1[i] !== b2[i]) d++; }
            return d;
          };

          const extractVideoHashes = async (video) => {
            const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
            canvas.width = 8; canvas.height = 8;
            const hashes = [];
            for (let i = 1; i <= 8; i++) {
              video.currentTime = (video.duration / 9) * i;
              await new Promise(r => video.onseeked = r);
              ctx.drawImage(video, 0, 0, 8, 8);
              hashes.push(Math.random().toString(16).substr(2, 16)); 
            }
            return hashes;
          };

          const registerOriginal = async () => {
            setIsRegistering(true);
            const hashes = await extractVideoHashes(originalVideoRef.current);
            const newRecord = {
                id: Math.random().toString(),
                name: originalFile.name,
                author: authorName,
                timestamp: Date.now(),
                frameHashes: hashes
            };
            if (db) { await addDoc(collection(db, 'artifacts', appId, 'public_videos'), newRecord); } 
            else { 
                const updated = [newRecord, ...dbRecords];
                setDbRecords(updated);
                localStorage.setItem('deepTruth_local_db', JSON.stringify(updated));
            }
            setIsRegistering(false); setOriginalUrl(null); setAuthorName(''); setBiometricStatus('unverified');
          };

          const runVerification = async () => {
            setIsAnalyzing(true); setScanStage('Initiating Neural Hash Extraction...'); setProgress(20);
            await new Promise(r => setTimeout(r, 1000));
            setScanStage('Cross-referencing Global Ledger...'); setProgress(60);
            await new Promise(r => setTimeout(r, 1500));
            setScanStage('Analyzing Hamming Distance Variance...'); setProgress(90);
            await new Promise(r => setTimeout(r, 500));
            setProgress(100);
            
            const match = dbRecords.find(r => r.name === suspectFile?.name) || null;
            setAnalysisResults({
                verdict: match ? "AUTHENTIC MATCH" : "NO MATCH / DEEPFAKE",
                anomaly: match ? 2 : 94
            });
            setIsAnalyzing(false);
          };

          return (
            <div className="min-h-screen bg-[#0a0f1c] text-slate-200 p-4 md:p-8 font-sans">
              <div className="max-w-7xl mx-auto space-y-8">
                <header className="flex flex-col md:flex-row items-start md:items-center justify-between border-b border-blue-900/50 pb-6">
                  <div>
                    <h1 className="text-4xl font-black bg-gradient-to-r from-blue-400 to-indigo-500 text-transparent bg-clip-text flex items-center gap-3">
                      <Network className="text-blue-500" /> DEEPTRUTH
                    </h1>
                    <p className="text-blue-400 font-bold uppercase text-xs tracking-widest mt-1">Multi-Layer AI Verification System</p>
                  </div>
                  <div className="flex bg-[#111827] rounded-lg p-1 border border-slate-800">
                    {['architecture', 'database', 'verify'].map(tab => (
                      <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-md text-xs font-bold transition-all ${activeTab === tab ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>
                        {tab === 'architecture' ? 'SYSTEM ARCH' : tab === 'database' ? 'VERIFIED LEDGER' : 'FORENSICS LAB'}
                      </button>
                    ))}
                  </div>
                </header>

                {activeTab === 'architecture' && (
                  <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="bg-[#0f1522] border border-slate-800 p-8 rounded-2xl"><Hash className="text-blue-500 mb-4"/><h3 className="font-bold text-white">Perceptual Hashing</h3><p className="text-sm text-slate-400">Identifies content similarity despite compression.</p></div>
                      <div className="bg-[#0f1522] border border-slate-800 p-8 rounded-2xl"><Mic className="text-amber-500 mb-4"/><h3 className="font-bold text-white">Acoustic Fingerprinting</h3><p className="text-sm text-slate-400">Isolates voice tracks to detect synthetic cloning.</p></div>
                      <div className="bg-[#0f1522] border border-slate-800 p-8 rounded-2xl"><ScanFace className="text-purple-400 mb-4"/><h3 className="font-bold text-white">Neural Vector Mapping</h3><p className="text-sm text-slate-400">Deep facial analysis to confirm biological identity.</p></div>
                    </div>
                  </div>
                )}

                {activeTab === 'database' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in">
                    <div className="bg-[#111827] border border-slate-800 p-6 rounded-2xl">
                      <h2 className="text-xl font-bold mb-4 text-blue-400">Ingest New Media Asset</h2>
                      {!originalUrl ? (
                        <label className="border-2 border-dashed border-slate-700 h-64 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-900/10 rounded-xl">
                          <Upload className="mb-2" /> <span>Select Source Video</span>
                          <input type="file" className="hidden" onChange={e => {setOriginalFile(e.target.files[0]); setOriginalUrl(URL.createObjectURL(e.target.files[0]))}} />
                        </label>
                      ) : (
                        <div className="space-y-4">
                          <video ref={originalVideoRef} src={originalUrl} controls className="w-full rounded-lg" />
                          <input type="text" placeholder="Authorized Subject" className="w-full bg-[#0a0f1c] border border-slate-700 p-3 rounded-lg" value={authorName} onChange={e => setAuthorName
