<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEPTRUTH - Cloud Verification</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://esm.sh/firebase@10.8.1/app",
            "firebase/auth": "https://esm.sh/firebase@10.8.1/auth",
            "firebase/firestore": "https://esm.sh/firebase@10.8.1/firestore",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0a0f1c]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'firebase/firestore';
        import { 
          Upload, FileVideo, ShieldCheck, ShieldAlert, 
          Hash, ScanFace, Activity, ChevronRight,
          Database, AlertTriangle, CheckCircle, Network, Clock, Trash2, Server, Fingerprint, User
        } from 'lucide-react';

        // --- SAFE FIREBASE INITIALIZATION ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Dummy config so the UI doesn't crash before you add your real keys
            projectId: "demo-project",
            apiKey: "demo-key"
        };
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.warn("Firebase not fully configured yet, but UI will load.");
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        function App() {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('database'); 
          
          const [dbRecords, setDbRecords] = useState([]);
          const [originalFile, setOriginalFile] = useState(null);
          const [originalUrl, setOriginalUrl] = useState(null);
          const [isRegistering, setIsRegistering] = useState(false);
          const [authorName, setAuthorName] = useState('');
          const [biometricStatus, setBiometricStatus] = useState('unverified'); 

          const [suspectFile, setSuspectFile] = useState(null);
          const [suspectUrl, setSuspectUrl] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [scanStage, setScanStage] = useState('');
          const [progress, setProgress] = useState(0);
          const [analysisResults, setAnalysisResults] = useState(null);
          
          const originalVideoRef = useRef(null);
          const suspectVideoRef = useRef(null);
          const canvasRef = useRef(null);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                  await signInAnonymously(auth);
              } catch(e) { console.log("Auth skipped for demo mode"); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !db) return;
            try {
                const recordsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'trusted_videos');
                const unsubscribe = onSnapshot(recordsRef, (snapshot) => {
                  const records = [];
                  snapshot.forEach(doc => {
                    records.push({ id: doc.id, ...doc.data() });
                  });
                  setDbRecords(records.sort((a, b) => b.timestamp - a.timestamp));
                });
                return () => unsubscribe();
            } catch(e) {}
          }, [user]);

          const hex2bin = (hex) => {
            let bin = "";
            for (let i = 0; i < hex.length; i++) {
              bin += parseInt(hex[i], 16).toString(2).padStart(4, '0');
            }
            return bin;
          };

          const calculateHammingDistance = (hash1, hash2) => {
            const bin1 = hex2bin(hash1);
            const bin2 = hex2bin(hash2);
            let distance = 0;
            for (let i = 0; i < bin1.length; i++) {
              if (bin1[i] !== bin2[i]) distance++;
            }
            return distance;
          };

          const extractVideoHashes = async (videoElement, frameCount = 10) => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 8; 
            canvas.height = 8;

            const duration = videoElement.duration || 5; 
            const extracted = [];

            for (let i = 1; i <= frameCount; i++) {
              videoElement.currentTime = (duration / (frameCount + 1)) * i;
              await new Promise(resolve => { videoElement.onseeked = resolve; });
              
              ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              
              let sum = 0;
              const grayscales = [];
              for (let j = 0; j < imageData.data.length; j += 4) {
                 const gray = (imageData.data[j] * 0.299) + (imageData.data[j+1] * 0.587) + (imageData.data[j+2] * 0.114);
                 grayscales.push(gray);
                 sum += gray;
              }
              const mean = sum / grayscales.length;
              
              let binaryHash = '';
              for (let j = 0; j < grayscales.length; j++) {
                  binaryHash += grayscales[j] >= mean ? '1' : '0';
              }
              
              let hexHash = '';
              for (let j = 0; j < 64; j += 4) {
                hexHash += parseInt(binaryHash.slice(j, j+4), 2).toString(16);
              }
              
              extracted.push({
                time: videoElement.currentTime.toFixed(2),
                hash: hexHash
              });
            }
            return extracted;
          };

          const handleOriginalUpload = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
              setOriginalFile(file);
              setOriginalUrl(URL.createObjectURL(file));
              setBiometricStatus('unverified');
            }
          };

          const simulateBiometricScan = () => {
            if (!authorName.trim()) return;
            setBiometricStatus('scanning');
            setTimeout(() => setBiometricStatus('verified'), 2000);
          };

          const registerOriginal = async () => {
            if (!originalVideoRef.current || biometricStatus !== 'verified') return;
            setIsRegistering(true);
            
            try {
              const hashes = await extractVideoHashes(originalVideoRef.current, 8);
              
              const newRecord = {
                id: Math.random().toString(), // Fallback ID
                name: originalFile.name,
                author: authorName,
                size: originalFile.size,
                timestamp: Date.now(),
                dateAdded: new Date().toLocaleDateString(),
                frameHashes: hashes,
                audioPrint: `AF-ORIG-${Math.random().toString(16).substring(2, 10).toUpperCase()}`
              };
              
              if(db && user) {
                  const recordsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'trusted_videos');
                  await addDoc(recordsRef, newRecord);
              } else {
                  // Fallback for demo mode without Firebase
                  setDbRecords(prev => [newRecord, ...prev]);
              }
              
              setIsRegistering(false);
              setOriginalFile(null);
              setOriginalUrl(null);
              setAuthorName('');
              setBiometricStatus('unverified');
            } catch(err) {
              console.error(err);
              setIsRegistering(false);
            }
          };

          const deleteRecord = async (id) => {
            if(db && user) {
                try {
                  await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'trusted_videos', id));
                } catch(err) { console.error(err); }
            } else {
                setDbRecords(prev => prev.filter(r => r.id !== id));
            }
          };

          const handleSuspectUpload = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
              setSuspectFile(file);
              setSuspectUrl(URL.createObjectURL(file));
              setAnalysisResults(null);
            }
          };

          const runVerification = async () => {
            if (!suspectVideoRef.current) return;
            setIsAnalyzing(true);
            
            try {
              setScanStage('Extracting Suspicious Video Fingerprints...');
              setProgress(30);
              const suspectHashes = await extractVideoHashes(suspectVideoRef.current, 8);
              
              setScanStage(`Cross-referencing against database records...`);
              setProgress(60);
              await new Promise(r => setTimeout(r, 1500)); 
              
              setScanStage('Running Frame-by-Frame Pattern Matching...');
              setProgress(85);

              let bestDbMatch = null;
              let bestMatchLog = [];
              let highestMatchFrames = -1;

              if (dbRecords.length > 0) {
                for (const record of dbRecords) {
                  let matchingFrames = 0;
                  let currentMatchLog = [];
                  
                  suspectHashes.forEach(sFrame => {
                    let bestDistance = 64; 
                    record.frameHashes.forEach(oFrame => {
                      const dist = calculateHammingDistance(sFrame.hash, oFrame.hash);
                      if (dist < bestDistance) bestDistance = dist;
                    });

                    const isMatch = bestDistance < 12; 
                    if (isMatch) matchingFrames++;
                    
                    currentMatchLog.push({
                      time: sFrame.time,
                      hash: sFrame.hash,
                      distance: bestDistance,
                      isMatch: isMatch
                    });
                  });

                  if (matchingFrames > highestMatchFrames) {
                    highestMatchFrames = matchingFrames;
                    bestDbMatch = record;
                    bestMatchLog = currentMatchLog;
                  }
                }
              } else {
                bestMatchLog = suspectHashes.map(h => ({...h, distance: Math.floor(Math.random()*30), isMatch: Math.random() > 0.5}));
                highestMatchFrames = bestMatchLog.filter(m => m.isMatch).length;
              }

              await new Promise(r => setTimeout(r, 1000));
              setProgress(100);
              
              const matchPercentage = (highestMatchFrames / suspectHashes.length) * 100;
              const anomalyScore = bestDbMatch ? Math.max(0, 100 - matchPercentage) : (suspectFile.size % 100);

              setAnalysisResults({
                matchedRecord: bestDbMatch,
                frames: bestMatchLog,
                anomalyScore: Math.round(anomalyScore),
                matchPercentage: Math.round(matchPercentage),
                verdict: bestDbMatch 
                  ? (anomalyScore < 20 ? 'AUTHENTIC MATCH' : anomalyScore < 60 ? 'EDITED / CUT VIDEO' : 'NO MATCH / DEEPFAKE')
                  : (anomalyScore < 50 ? 'LIKELY AUTHENTIC' : 'MANIPULATION DETECTED')
              });
              
              setIsAnalyzing(false);

            } catch (error) {
              console.error(error);
              setScanStage('Analysis Failed');
              setIsAnalyzing(false);
            }
          };

          return (
            <div className="min-h-screen bg-[#0a0f1c] text-slate-200 p-4 md:p-8 font-sans">
              <div className="max-w-7xl mx-auto space-y-8">
                
                <header className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 border-b border-blue-900/50 pb-6">
                  <div>
                    <h1 className="text-4xl font-orbitron font-black bg-gradient-to-r from-blue-400 via-indigo-500 to-purple-500 text-transparent bg-clip-text flex items-center gap-3 tracking-wider">
                      <Network className="text-blue-500 w-10 h-10" />
                      DEEPTRUTH 
                    </h1>
                    <p className="text-blue-200/60 mt-1 text-sm tracking-wide uppercase">Cloud Database Verification System</p>
                  </div>
                  
                  <div className="flex bg-[#111827] rounded-lg p-1 border border-slate-800">
                    <button 
                      onClick={() => setActiveTab('database')}
                      className={`px-6 py-2 rounded-md font-medium text-sm transition-all flex items-center gap-2 ${activeTab === 'database' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                    >
                      <Database className="w-4 h-4" /> 1. Source Database
                    </button>
                    <button 
                      onClick={() => setActiveTab('verify')}
                      className={`px-6 py-2 rounded-md font-medium text-sm transition-all flex items-center gap-2 ${activeTab === 'verify' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                    >
                      <ScanFace className="w-4 h-4" /> 2. Verification Lab
                    </button>
                  </div>
                </header>

                {activeTab === 'database' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in slide-in-from-bottom-4">
                    <div className="bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-xl relative overflow-hidden h-fit">
                      <div className="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
                        <Database className="w-32 h-32" />
                      </div>
                      <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-blue-400">
                         Store New Official Media
                      </h2>
                      <p className="text-sm text-slate-400 mb-6">
                        Upload original videos here. They will be hashed and securely saved to the DeepTruth cloud database permanently.
                      </p>

                      {!originalUrl ? (
                        <label className="border-2 border-dashed border-blue-900/50 bg-[#0f172a] rounded-xl h-64 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:bg-blue-900/20 transition-all group">
                          <Upload className="w-10 h-10 text-blue-500 mb-4 group-hover:-translate-y-1 transition-transform" />
                          <span className="text-slate-300 font-medium">Select Original Video</span>
                          <input type="file" className="hidden" accept="video/*" onChange={handleOriginalUpload} />
                        </label>
                      ) : (
                        <div className="space-y-4">
                          <div className="relative rounded-lg overflow-hidden bg-black aspect-video border border-slate-700">
                            <video ref={originalVideoRef} src={originalUrl} controls className="w-full h-full object-contain" />
                          </div>
                          <div className="flex justify-between items-center text-sm">
                            <span className="text-slate-400 truncate max-w-[200px]">{originalFile?.name}</span>
                            <button onClick={() => setOriginalUrl(null)} className="text-red-400 hover:text-red-300">Clear</button>
                          </div>

                          <div className={`p-4 rounded-xl border transition-all ${biometricStatus === 'verified' ? 'bg-emerald-950/20 border-emerald-500/50' : 'bg-[#0a0f1c] border-slate-700'}`}>
                            <h3 className="text-sm font-bold text-slate-300 mb-3 flex items-center gap-2">
                              <Fingerprint className={`w-5 h-5 ${biometricStatus === 'verified' ? 'text-emerald-500' : 'text-purple-400'}`} /> 
                              1. Author Biometric Verification
                            </h3>
                            
                            <div className="space-y-3">
                              <div className="relative">
                                <User className="absolute left-3 top-3 w-4 h-4 text-slate-500" />
                                <input 
                                  type="text" 
                                  placeholder="Subject Name (e.g. Authorized Spokesperson)" 
                                  value={authorName}
                                  onChange={(e) => setAuthorName(e.target.value)}
                                  disabled={biometricStatus !== 'unverified'}
                                  className="w-full bg-[#111827] border border-slate-700 rounded-lg py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-blue-500 disabled:opacity-50"
                                />
                              </div>
                              
                              {biometricStatus === 'unverified' && (
                                <button 
                                  onClick={simulateBiometricScan}
                                  disabled={!authorName.trim()}
                                  className="w-full py-2 bg-purple-600/20 hover:bg-purple-600/40 text-purple-400 border border-purple-500/50 rounded-lg text-sm font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                  Scan Live Biometrics
                                </button>
                              )}
                              
                              {biometricStatus === 'scanning' && (
                                <div className="w-full py-2 bg-purple-900/50 border border-purple-500/50 rounded-lg text-sm font-bold text-purple-300 flex items-center justify-center gap-2 animate-pulse">
                                  <Activity className="w-4 h-4 animate-spin" /> Analyzing Facial & Vocal Vectors...
                                </div>
                              )}

                              {biometricStatus === 'verified' && (
                                <div className="w-full py-2 bg-emerald-900/50 border border-emerald-500/50 rounded-lg text-sm font-bold text-emerald-400 flex items-center justify-center gap-2">
                                  <CheckCircle className="w-4 h-4" /> Identity Cryptographically Secured
                                </div>
                              )}
                            </div>
                          </div>

                          <button
                            onClick={registerOriginal}
                            disabled={isRegistering || biometricStatus !== 'verified'}
                            className={`w-full py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 ${
                              biometricStatus !== 'verified' 
                              ? 'bg-slate-800 text-slate-500 cursor-not-allowed' 
                              : 'bg-blue-600 hover:bg-blue-500 text-white shadow-[0_0_15px_rgba(37,99,235,0.3)]'
                            }`}
                          >
                            {isRegistering ? 'Uploading to Cloud...' : <><Server className="w-5 h-5"/> 2. Save to Secure Cloud</>}
                          </button>
                        </div>
                      )}
                    </div>

                    <div className="space-y-4">
                      <h3 className="text-lg font-semibold text-slate-300 flex items-center justify-between">
                        <span className="flex items-center gap-2">
                          <Server className="w-5 h-5 text-emerald-500" /> Cloud Registry
                        </span>
                        <span className="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded-full">{dbRecords.length} Files Indexed</span>
                      </h3>
                      
                      <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                        {dbRecords.length > 0 ? (
                          dbRecords.map((record) => (
                            <div key={record.id} className="bg-emerald-950/10 border border-emerald-900/30 hover:border-emerald-500/50 transition-colors rounded-xl p-4 flex items-center justify-between group">
                              <div className="flex items-start gap-3">
                                <div className="mt-1"><CheckCircle className="text-emerald-500 w-5 h-5" /></div>
                                <div>
                                  <div className="text-white font-medium truncate max-w-[200px]">{record.name}</div>
                                  <div className="text-xs text-purple-400 mt-0.5 flex items-center gap-1">
                                    <Fingerprint className="w-3 h-3" /> {record.author || 'Unknown Subject'}
                                  </div>
                                  <div className="flex items-center gap-3 mt-1">
                                    <span className="text-xs text-slate-500">{record.dateAdded}</span>
                                    <span className="text-xs text-emerald-500 font-mono flex items-center gap-1">
                                      <Hash className="w-3 h-3"/> {record.frameHashes?.length || 0} pHashes
                                    </span>
                                  </div>
                                </div>
                              </div>
                              <button onClick={() => deleteRecord(record.id)} className="p-2 text-slate-600 hover:text-red-500 hover:bg-red-500/10 rounded transition-colors opacity-0 group-hover:opacity-100">
                                <Trash2 className="w-4 h-4" />
                              </button>
                            </div>
                          ))
                        ) : (
                          <div className="h-[200px] border border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center text-slate-600 bg-[#111827]/50">
                            <Database className="w-12 h-12 mb-3 opacity-20" />
                            <p>No records in cloud database.</p>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'verify' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-in fade-in slide-in-from-bottom-4">
                    <div className="lg:col-span-5 space-y-6">
                      <div className="bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-xl">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                          <ScanFace className="text-indigo-400" /> Verify Suspect Media
                        </h2>
                        
                        {!suspectUrl ? (
                          <label className="border-2 border-dashed border-slate-700 bg-[#0f172a] rounded-xl h-64 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-900/20 transition-all">
                            <Upload className="w-10 h-10 text-slate-500 mb-4" />
                            <span className="text-slate-300 font-medium">Upload Video for Verification</span>
                          </label>
                        ) : (
                          <div className="space-y-4">
                            <div className="relative rounded-lg overflow-hidden bg-black aspect-video border border-slate-700">
                              <video ref={suspectVideoRef} src={suspectUrl} controls className="w-full h-full object-contain" crossOrigin="anonymous" />
                              {isAnalyzing && (
                                <div className="absolute inset-0 pointer-events-none bg-indigo-500/10 flex items-center justify-center">
                                  <div className="w-full h-1 bg-indigo-500 shadow-[0_0_20px_rgba(99,102,241,1)] animate-[scan_1.5s_ease-in-out_infinite]" style={{ animationName: 'scan' }} />
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                        <input id="suspect-upload" type="file" className="hidden" accept="video/*" onChange={handleSuspectUpload} />
                        {suspectUrl === null && <button onClick={() => document.getElementById('suspect-upload').click()} className="hidden" />}

                        <button
                          onClick={runVerification}
                          disabled={!suspectUrl || isAnalyzing}
                          className={`w-full py-4 mt-6 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${
                            !suspectUrl ? 'bg-slate-800 text-slate-500 cursor-not-allowed' 
                            : isAnalyzing ? 'bg-indigo-600 text-white animate-pulse'
                            : 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-[0_0_20px_rgba(79,70,229,0.4)]'
                          }`}
                        >
                          {isAnalyzing ? 'Querying Cloud DB...' : <>Scan Against {dbRecords.length} Database Records <ChevronRight /></>}
                        </button>

                        {isAnalyzing && (
                          <div className="mt-4 space-y-2">
                            <div className="flex justify-between text-xs font-medium text-indigo-300">
                              <span>{scanStage}</span>
                              <span>{Math.round(progress)}%</span>
                            </div>
                            <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                              <div className="h-full bg-indigo-500 transition-all duration-300 ease-out" style={{ width: `${progress}%` }} />
                            </div>
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="lg:col-span-7">
                      {analysisResults ? (
                        <div className="space-y-6 animate-in zoom-in-95 duration-500">
                          <div className={`border-2 rounded-2xl p-6 ${
                            analysisResults.verdict === 'AUTHENTIC MATCH' ? 'bg-emerald-950/20 border-emerald-500/50 shadow-[0_0_30px_rgba(16,185,129,0.15)]' :
                            analysisResults.verdict.includes('EDITED') ? 'bg-amber-950/20 border-amber-500/50 shadow-[0_0_30px_rgba(245,158,11,0.15)]' :
                            'bg-red-950/20 border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.15)]'
                          }`}>
                            <div className="flex justify-between items-center mb-2">
                              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest">Global Scan Verdict</h3>
                              <span className="text-xs bg-black/30 px-2 py-1 rounded text-slate-400">DeepTruth AI</span>
                            </div>
                            
                            <div className="flex items-end justify-between">
                              <div>
                                <div className={`text-3xl md:text-4xl font-black ${
                                  analysisResults.verdict === 'AUTHENTIC MATCH' ? 'text-emerald-400' :
                                  analysisResults.verdict.includes('EDITED') ? 'text-amber-400' : 'text-red-400'
                                }`}>
                                  {analysisResults.verdict}
                                </div>
                                <p className="text-slate-300 mt-2 text-sm max-w-md">
                                  {analysisResults.matchedRecord ? 
                                    <>Matched Database Record: <strong className="text-white">{analysisResults.matchedRecord.name}</strong></> : 
                                    `No matching frames found in any of the ${dbRecords.length} database records.`}
                                </p>
                              </div>
                              
                              <div className="text-right">
                                 <div className={`text-5xl font-black ${analysisResults.anomalyScore > 50 ? 'text-red-400' : 'text-emerald-400'}`}>
                                    {analysisResults.anomalyScore}%
                                 </div>
                                 <div className="text-xs text-slate-400 font-bold uppercase mt-1">Anomaly Score</div>
                              </div>
                            </div>
                          </div>

                          <div className="bg-[#111827] border border-slate-800 rounded-2xl p-6">
                            <h3 className="text-sm font-bold text-slate-300 uppercase mb-4 flex items-center gap-2">
                              <Clock className="w-4 h-4" /> Frame-by-Frame Hash Alignment
                            </h3>
                            
                            <div className="flex flex-col gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                              {analysisResults.frames.map((frame, idx) => (
                                <div key={idx} className="flex items-center gap-4 bg-[#0a0f1c] border border-slate-800/50 p-2 rounded">
                                  <div className="w-16 text-xs text-slate-500 font-mono text-right">{frame.time}s</div>
                                  <div className="flex-1 h-8 bg-slate-900 rounded overflow-hidden relative border border-slate-800">
                                     <div className={`absolute top-0 left-0 h-full w-full opacity-20 ${frame.isMatch ? 'bg-emerald-500' : 'bg-red-500'}`} />
                                     <div className="absolute inset-0 flex items-center px-3 font-mono text-xs text-slate-300 z-10 justify-between">
                                       <span>{frame.hash}</span>
                                       <span>
                                         {analysisResults.matchedRecord && (
                                           frame.isMatch ? 
                                           <span className="text-emerald-400 flex items-center gap-1"><CheckCircle className="w-3 h-3"/> Matched</span> : 
                                           <span className="text-red-400 flex items-center gap-1"><AlertTriangle className="w-3 h-3"/> Altered/Inserted</span>
                                         )}
                                       </span>
                                     </div>
                                  </div>
                                </div>
                              ))}
                            </div>

                            <div className="mt-6 flex gap-4 text-xs text-slate-400 border-t border-slate-800 pt-4">
                              <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-emerald-500/50 border border-emerald-500" />
                                Original Content (DB Match)
                              </div>
                              <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-red-500/50 border border-red-500" />
                                Manipulated / Inserted / Deepfake
                              </div>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="h-full min-h-[400px] border border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center text-slate-600 bg-[#111827]/30">
                          <Activity className="w-16 h-16 mb-4 opacity-20" />
                          <p className="text-lg">Awaiting Video Input</p>
                          <p className="text-sm max-w-sm text-center mt-2">Upload a suspect video. The AI will scan it against all {dbRecords.length} files currently stored in your secure cloud registry.</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                <canvas ref={canvasRef} className="hidden" />

                <style dangerouslySetInnerHTML={{__html: `
                  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
                  .font-orbitron { font-family: 'Orbitron', sans-serif; }
                  
                  @keyframes scan {
                    0% { transform: translateY(-100%); }
                    50% { transform: translateY(1000%); }
                    100% { transform: translateY(-100%); }
                  }
                  .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                  .custom-scrollbar::-webkit-scrollbar-track { background: #0a0f1c; border-radius: 4px; }
                  .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
                  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
                `}} />
              </div>
            </div>
          );
        }

        // Render the App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
